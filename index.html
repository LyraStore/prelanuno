<html lang="es">

            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />

                                Array.prototype.slice.call(arguments, 0),

                for (var i = 0; i < ttq.methods.length; i++) {

                ttq.load = function (e) {

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <title>Oferta Exclusiva para Ti 💜</title>

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            body {
                font-family: "Lato", sans-serif;
                min-height: 100vh;
                min-height: 100dvh;
                background: linear-gradient(
                    145deg,
                    #fdf2f8 0%,
                    #faf5ff 50%,
                    #f5f3ff 100%
                );
                display: flex;
                align-items: center;
                justify-content: center;
                /* Scroll si no cabe — importante para pantallas muy pequeñas */
                overflow-x: hidden;
                overflow-y: auto;
                padding: 12px;
                position: relative;
            }

            /* ── Orbes de fondo ── */
            .orb {
                position: fixed;
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
            }
            .orb-1 {
                width: 50vw;
                height: 50vw;
                max-width: 260px;
                max-height: 260px;
                top: -10vw;
                left: -10vw;
                background: radial-gradient(
                    circle,
                    rgba(192, 132, 252, 0.22) 0%,
                    transparent 70%
                );
                animation: orb-move 7s ease-in-out infinite alternate;
            }
            .orb-2 {
                width: 45vw;
                height: 45vw;
                max-width: 220px;
                max-height: 220px;
                bottom: -10vw;
                right: -10vw;
                background: radial-gradient(
                    circle,
                    rgba(244, 114, 182, 0.2) 0%,
                    transparent 70%
                );
                animation: orb-move 9s ease-in-out infinite alternate-reverse;
            }
            @keyframes orb-move {
                from {
                    transform: scale(1);
                }
                to {
                    transform: scale(1.15) translate(10px, 8px);
                }
            }

            /* ── Pétalos ── */
            .petal {
                position: fixed;
                pointer-events: none;
                opacity: 0.15;
                z-index: 0;
                font-size: 5vw;
                animation: petal-drift linear infinite;
            }
            .petal:nth-child(3) {
                top: 4%;
                left: 4%;
                animation-duration: 13s;
            }
            .petal:nth-child(4) {
                top: 8%;
                right: 4%;
                animation-duration: 17s;
                animation-delay: -5s;
            }
            .petal:nth-child(5) {
                top: 75%;
                left: 4%;
                animation-duration: 11s;
                animation-delay: -3s;
            }
            .petal:nth-child(6) {
                top: 65%;
                right: 4%;
                animation-duration: 15s;
                animation-delay: -8s;
            }
            @keyframes petal-drift {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 0.15;
                }
                50% {
                    opacity: 0.25;
                }
                100% {
                    transform: translateY(-20px) rotate(18deg);
                    opacity: 0.15;
                }
            }

            /* ══════════════════════════════
         WRAPPER — borde degradado
      ══════════════════════════════ */
            .wrapper {
                position: relative;
                z-index: 1;
                /* Ocupa todo el ancho disponible, máximo 400px */
                width: 100%;
                max-width: 400px;
                padding: 3px;
                border-radius: 24px;
                background: linear-gradient(
                    135deg,
                    #f472b6 0%,
                    #c084fc 55%,
                    #a78bfa 100%
                );
                animation: glow 4s ease-in-out infinite alternate;
                cursor: pointer;
            }
            @keyframes glow {
                from {
                    box-shadow: 0 6px 30px rgba(192, 132, 252, 0.28);
                }
                to {
                    box-shadow: 0 10px 48px rgba(192, 132, 252, 0.55);
                }
            }

            /* ══════════════════════════════
         CARD
      ══════════════════════════════ */
            .card {
                background: #fff;
                border-radius: 21px;
                /* padding vertical/horizontal en % del ancho para escala fluida */
                padding: 5vw;
                display: flex;
                flex-direction: column;
                gap: 3.5vw;
                text-align: center;
                animation: rise 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
            }
            /* En pantallas grandes no exceder valores cómodos */
            @media (min-width: 400px) {
                .card {
                    padding: 20px;
                    gap: 14px;
                }
            }
            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(20px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            /* ── Badge row ── */
            .badge-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 2vw;
                flex-wrap: wrap;
            }
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 1.5vw;
                background: linear-gradient(90deg, #fce7f3, #ede9fe);
                color: #7c5f90;
                font-size: max(9px, 2.5vw);
                font-weight: 700;
                letter-spacing: 0.8px;
                text-transform: uppercase;
                border-radius: 100px;
                padding: 1.5vw 3.5vw;
                border: 1px solid #fbcfe8;
                white-space: nowrap;
            }
            @media (min-width: 400px) {
                .badge {
                    font-size: 11px;
                    padding: 6px 14px;
                    gap: 6px;
                }
                .badge-row {
                    gap: 8px;
                }
            }
            .badge-dot {
                width: max(5px, 1.6vw);
                height: max(5px, 1.6vw);
                border-radius: 50%;
                background: linear-gradient(135deg, #f472b6, #c084fc);
                animation: blink 1.1s step-start infinite;
                flex-shrink: 0;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }

            .flag {
                font-size: max(16px, 5vw);
                line-height: 1;
                animation: bounce 2s ease-in-out infinite;
            }
            @media (min-width: 400px) {
                .flag {
                    font-size: 20px;
                }
            }
            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-4px);
                }
            }

            /* ── Ícono verificado ── */
            .icon-wrap {
                width: max(52px, 14vw);
                height: max(52px, 14vw);
                border-radius: 50%;
                background: linear-gradient(135deg, #fce7f3, #ede9fe);
                border: 2px solid #fbcfe8;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto;
                box-shadow: 0 3px 14px rgba(244, 114, 182, 0.22);
                flex-shrink: 0;
            }
            @media (min-width: 400px) {
                .icon-wrap {
                    width: 72px;
                    height: 72px;
                }
            }
            .icon-wrap img {
                width: max(30px, 8.5vw);
                height: auto;
                display: block;
                filter: drop-shadow(0 2px 6px rgba(192, 132, 252, 0.38));
            }
            @media (min-width: 400px) {
                .icon-wrap img {
                    width: 44px;
                }
            }

            /* ── Título ── */
            h2 {
                font-family: "Playfair Display", serif;
                font-size: max(17px, 5vw);
                font-weight: 800;
                color: #3b1f4a;
                line-height: 1.25;
            }
            @media (min-width: 400px) {
                h2 {
                    font-size: 24px;
                }
            }
            .gradient-text {
                background: linear-gradient(90deg, #f472b6, #c084fc);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            /* ── Subtexto ── */
            p.sub {
                font-size: max(12px, 3.2vw);
                color: #7c5f90;
                line-height: 1.5;
            }
            @media (min-width: 400px) {
                p.sub {
                    font-size: 14px;
                }
            }
            p.sub b {
                color: #3b1f4a;
                font-weight: 700;
            }

            /* ── Divider ── */
            .divider {
                border: none;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    #fbcfe8,
                    #ddd6fe,
                    transparent
                );
            }

            /* ── Video ── */
            .video-wrap {
                width: 100%;
                /* altura dinámica según viewport para que siempre quede visible */
                height: clamp(130px, 35vw, 210px);
                border-radius: max(10px, 2.8vw);
                overflow: hidden;
                background: #ede9fe;
                position: relative;
                border: 1.5px solid #ddd6fe;
                box-shadow: 0 3px 16px rgba(192, 132, 252, 0.18);
                flex-shrink: 0;
            }
            @media (min-width: 400px) {
                .video-wrap {
                    height: 200px;
                    border-radius: 14px;
                }
            }
            .video-wrap video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .video-wrap::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    to top,
                    rgba(59, 31, 74, 0.28) 0%,
                    transparent 55%
                );
                pointer-events: none;
                border-radius: inherit;
            }

            /* ── Estrellas / confianza ── */
            .trust-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 1.5vw;
                flex-wrap: wrap;
            }
            @media (min-width: 400px) {
                .trust-row {
                    gap: 6px;
                }
            }
            .stars {
                color: #f59e0b;
                font-size: max(12px, 3.5vw);
                letter-spacing: 1px;
            }
            .trust-text {
                font-size: max(10px, 2.6vw);
                color: #b89ec4;
                font-weight: 600;
            }
            @media (min-width: 400px) {
                .stars {
                    font-size: 14px;
                }
                .trust-text {
                    font-size: 11px;
                }
            }

            /* ── Urgencia ── */
            .urgency-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 2vw;
                background: linear-gradient(90deg, #fce7f3, #ede9fe);
                border: 1px solid #fbcfe8;
                border-radius: max(8px, 2.5vw);
                padding: 2.5vw 3vw;
            }
            @media (min-width: 400px) {
                .urgency-row {
                    gap: 8px;
                    border-radius: 11px;
                    padding: 10px 14px;
                }
            }
            .urgency-icon {
                font-size: max(13px, 3.5vw);
                line-height: 1;
                flex-shrink: 0;
            }
            .urgency-text {
                font-size: max(10px, 2.7vw);
                color: #7c5f90;
                font-weight: 700;
                line-height: 1.3;
                text-align: left;
            }
            @media (min-width: 400px) {
                .urgency-text {
                    font-size: 12px;
                }
            }

            /* ── Botón CTA ── */
            .btn-cta {
                display: block;
                width: 100%;
                padding: max(13px, 3.8vw);
                border: none;
                border-radius: max(10px, 3vw);
                background: linear-gradient(90deg, #f472b6 0%, #c084fc 100%);
                background-size: 200% 100%;
                background-position: 0%;
                color: #fff;
                font-family: "Playfair Display", serif;
                font-size: max(14px, 4vw);
                font-weight: 700;
                cursor: pointer;
                transition:
                    background-position 0.4s,
                    transform 0.15s,
                    box-shadow 0.2s;
                box-shadow: 0 5px 20px rgba(192, 132, 252, 0.42);
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
                position: relative;
                overflow: hidden;
            }
            @media (min-width: 400px) {
                .btn-cta {
                    padding: 16px;
                    font-size: 17px;
                    border-radius: 14px;
                }
            }
            .btn-cta::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.22),
                    transparent
                );
                transform: translateX(-100%);
                transition: transform 0.55s ease;
            }
            .btn-cta:hover {
                background-position: 100%;
                box-shadow: 0 7px 28px rgba(192, 132, 252, 0.58);
                transform: translateY(-1px);
            }
            .btn-cta:hover::before {
                transform: translateX(100%);
            }
            .btn-cta:active {
                transform: scale(0.97);
            }

            /* ── Footer ── */
            .footer-note {
                font-size: max(9px, 2.4vw);
                color: #b89ec4;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
            }
            @media (min-width: 400px) {
                .footer-note {
                    font-size: 10px;
                }
            }

            /* Honeypot */
            .nameuser-f {
                display: none;
            }
        </style>
    </head>

    <body>
        <!-- Fondo -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <span class="petal">🌸</span>
        <span class="petal">✨</span>
        <span class="petal">💜</span>
        <span class="petal">🌷</span>

        <div class="wrapper" onclick="handleClick()">
            <div class="card">
                <!-- Badge + bandera -->
                <div class="badge-row">
                    <div class="badge">
                        <span class="badge-dot"></span>
                        Solo hoy · Oferta limitada
                    </div>
                    <span class="flag">🇨🇴</span>
                </div>

                <!-- Ícono -->
                <div class="icon-wrap">
                    <img
                        src="https://cdn.shopify.com/s/files/1/0682/3981/8907/files/verified.webp?v=1742350641"
                        alt="Verificado"
                    />
                </div>

                <!-- Título -->
                <h2>
                    Descuento especial<br /><span class="gradient-text"
                        >para Colombia 💜</span
                    >
                </h2>
                <p class="sub">
                    Continúa y no pierdas este <b>precio exclusivo</b> en este
                    producto.
                </p>

                <hr class="divider" />

                <!-- Video -->
                <div class="video-wrap">
                    <video
                        autoplay
                        muted
                        loop
                        playsinline
                        src="https://cdn.shopify.com/videos/c/o/v/9b0b6c66f64240079b459847ec878470.mp4"
                    ></video>
                </div>

                <!-- Estrellas -->
                <div class="trust-row">
                    <span class="stars">★★★★★</span>
                    <span class="trust-text">+2,400 mujeres lo amaron</span>
                </div>

                <!-- Urgencia -->
                <div class="urgency-row">
                    <span class="urgency-icon">⏳</span>
                    <span class="urgency-text"
                        >Oferta válida hasta agotar existencias</span
                    >
                </div>

                <!-- Honeypot -->
                <input
                    type="text"
                    name="website"
                    class="nameuser-f"
                    tabindex="-1"
                    autocomplete="off"
                    value=""
                />

                <!-- CTA -->
                <button class="btn-cta" id="btnContinuar">
                    Ver mi oferta →
                </button>

                <p class="footer-note">
                    <span>🔒</span> Compra segura · Envío a toda Colombia
                </p>
            </div>
        </div>

        <script>
            const offerUrl = "https://lyrastores.com/envios-col";
            const pageLoadTime = Date.now();
            const MIN_TIME_MS = 1500;
            const isOrNot = {
                mouseMoved: false,
                scrolled: false,
                touched: false,
            };

            document.addEventListener("mousemove", () => {
                isOrNot.mouseMoved = true;
            });
            document.addEventListener("scroll", () => {
                isOrNot.scrolled = true;
            });
            document.addEventListener("touchstart", () => {
                isOrNot.touched = true;
            });

            function puntosAcc() {
                return Object.values(isOrNot).filter(Boolean).length;
            }

            function handleClick() {
                const honeypot = document.querySelector('[name="website"]');
                if (honeypot && honeypot.value !== "") return;
                if (Date.now() - pageLoadTime < MIN_TIME_MS) return;
                if (puntosAcc() < 1) {
                    console.warn("Bot detectado");
                    return;
                }
                redirectToOffer();
            }

            function redirectToOffer() {
                if (typeof ttq !== "undefined") {
                    ttq.track("ClickButton");
                }
                window.location.href = offerUrl;
            }
        </script>
    </body>
</html>
