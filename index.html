    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>Oferta Exclusiva para Ti 💜</title>

    <style>
      :root {
        --pink: #f472b6;
        --pink-soft: #fce7f3;
        --pink-mid: #fbcfe8;
        --lilac: #c084fc;
        --lilac-soft: #ede9fe;
        --lilac-mid: #ddd6fe;
        --text-dark: #3b1f4a;
        --text-mid: #7c5f90;
        --text-light: #b89ec4;

        /* Escala base para pantallas pequeñas */
        --gap: clamp(8px, 2.5vw, 16px);
        --pad-v: clamp(14px, 4vw, 30px);
        --pad-h: clamp(12px, 4vw, 26px);
        --r-card: clamp(16px, 4vw, 26px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      body {
        font-family: "Lato", sans-serif;
        min-height: 100%;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Permitir scroll si la card no cabe en pantalla muy pequeña */
        overflow-y: auto;
        overflow-x: hidden;
        background: linear-gradient(
          145deg,
          #fdf2f8 0%,
          #faf5ff 50%,
          #f5f3ff 100%
        );
        position: relative;
        padding: 10px 0;
      }

      /* ── Orbes de fondo ── */
      body::before {
        content: "";
        position: fixed;
        top: -80px;
        left: -80px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(192, 132, 252, 0.2) 0%,
          transparent 70%
        );
        pointer-events: none;
        animation: float-orb 7s ease-in-out infinite alternate;
      }
      body::after {
        content: "";
        position: fixed;
        bottom: -80px;
        right: -80px;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(244, 114, 182, 0.18) 0%,
          transparent 70%
        );
        pointer-events: none;
        animation: float-orb 9s ease-in-out infinite alternate-reverse;
      }
      @keyframes float-orb {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.15) translate(14px, 10px);
        }
      }

      /* ── Pétalos decorativos ── */
      .petal {
        position: fixed;
        opacity: 0.15;
        pointer-events: none;
        animation: drift linear infinite;
      }
      .petal:nth-child(1) {
        top: 4%;
        left: 4%;
        font-size: clamp(14px, 4vw, 22px);
        animation-duration: 14s;
      }
      .petal:nth-child(2) {
        top: 10%;
        right: 4%;
        font-size: clamp(12px, 3vw, 18px);
        animation-duration: 18s;
        animation-delay: -4s;
      }
      .petal:nth-child(3) {
        top: 78%;
        left: 4%;
        font-size: clamp(11px, 3vw, 16px);
        animation-duration: 12s;
        animation-delay: -7s;
      }
      .petal:nth-child(4) {
        top: 65%;
        right: 4%;
        font-size: clamp(13px, 3.5vw, 20px);
        animation-duration: 16s;
        animation-delay: -2s;
      }
      @keyframes drift {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0.15;
        }
        50% {
          opacity: 0.25;
        }
        100% {
          transform: translateY(-24px) rotate(20deg);
          opacity: 0.15;
        }
      }

      /* ── Wrapper borde degradado ── */
      .wrapper {
        position: relative;
        z-index: 1;
        width: min(380px, calc(100vw - 16px));
        padding: 3px;
        border-radius: calc(var(--r-card) + 3px);
        background: linear-gradient(
          135deg,
          var(--pink) 0%,
          var(--lilac) 50%,
          #a78bfa 100%
        );
        animation: glow-ring 4s ease-in-out infinite alternate;
        cursor: pointer;
      }
      @keyframes glow-ring {
        from {
          box-shadow: 0 6px 32px rgba(192, 132, 252, 0.28);
        }
        to {
          box-shadow: 0 10px 50px rgba(192, 132, 252, 0.52);
        }
      }

      /* ── Card ── */
      .card {
        background: #fff;
        border-radius: var(--r-card);
        padding: var(--pad-v) var(--pad-h);
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: var(--gap);
        animation: rise 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(22px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* ── Badge ── */
      .badge-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(5px, 2vw, 8px);
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: clamp(4px, 1.5vw, 6px);
        background: linear-gradient(90deg, #fce7f3, #ede9fe);
        color: var(--text-mid);
        font-size: clamp(9px, 2.4vw, 11px);
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 100px;
        padding: clamp(4px, 1.5vw, 6px) clamp(10px, 3vw, 16px);
        border: 1px solid var(--pink-mid);
        white-space: nowrap;
      }
      .badge-dot {
        width: clamp(5px, 1.5vw, 7px);
        height: clamp(5px, 1.5vw, 7px);
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink), var(--lilac));
        animation: blink 1.1s step-start infinite;
        flex-shrink: 0;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .flag {
        font-size: clamp(16px, 4.5vw, 22px);
        animation: bounce 2s ease-in-out infinite;
        line-height: 1;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      /* ── Ícono verificado ── */
      .icon-wrap {
        width: clamp(52px, 14vw, 74px);
        height: clamp(52px, 14vw, 74px);
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--pink-soft),
          var(--lilac-soft)
        );
        border: 2px solid var(--pink-mid);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        box-shadow: 0 3px 16px rgba(244, 114, 182, 0.22);
        flex-shrink: 0;
      }
      .icon-wrap img {
        width: clamp(30px, 8.5vw, 46px);
        height: auto;
        display: block;
        filter: drop-shadow(0 2px 6px rgba(192, 132, 252, 0.38));
      }

      /* ── Título ── */
      h2 {
        font-family: "Playfair Display", serif;
        font-size: clamp(18px, 5.2vw, 26px);
        font-weight: 800;
        color: var(--text-dark);
        line-height: 1.25;
      }
      h2 .gradient-text {
        background: linear-gradient(90deg, var(--pink), var(--lilac));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Subtexto ── */
      p.sub {
        font-size: clamp(12px, 3.2vw, 14px);
        color: var(--text-mid);
        line-height: 1.55;
      }
      p.sub b {
        color: var(--text-dark);
        font-weight: 700;
      }

      /* ── Divider ── */
      .divider {
        border: none;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--pink-mid),
          var(--lilac-mid),
          transparent
        );
      }

      /* ── Video ── */
      .video-wrap {
        width: 100%;
        /* En pantallas muy pequeñas limitamos la altura para que todo quepa */
        max-height: clamp(160px, 38vw, 230px);
        aspect-ratio: 9/16;
        border-radius: clamp(10px, 3vw, 16px);
        overflow: hidden;
        background: var(--lilac-soft);
        position: relative;
        border: 1.5px solid var(--lilac-mid);
        box-shadow: 0 3px 18px rgba(192, 132, 252, 0.18);
      }
      .video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .video-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(59, 31, 74, 0.28) 0%,
          transparent 55%
        );
        pointer-events: none;
        border-radius: inherit;
      }

      /* ── Estrellas ── */
      .trust-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(3px, 1.5vw, 6px);
        flex-wrap: wrap;
      }
      .stars {
        color: #f59e0b;
        font-size: clamp(12px, 3.5vw, 15px);
        letter-spacing: 1px;
      }
      .trust-text {
        font-size: clamp(10px, 2.8vw, 12px);
        color: var(--text-light);
        font-weight: 600;
      }

      /* ── Urgencia ── */
      .urgency-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(5px, 2vw, 8px);
        background: linear-gradient(90deg, #fce7f3, #ede9fe);
        border: 1px solid var(--pink-mid);
        border-radius: clamp(8px, 2.5vw, 12px);
        padding: clamp(7px, 2.5vw, 10px) clamp(10px, 3vw, 16px);
      }
      .urgency-icon {
        font-size: clamp(13px, 3.5vw, 16px);
        line-height: 1;
      }
      .urgency-text {
        font-size: clamp(10px, 2.8vw, 13px);
        color: var(--text-mid);
        font-weight: 700;
        text-align: left;
        line-height: 1.3;
      }

      /* ── Botón CTA ── */
      .btn-cta {
        display: block;
        width: 100%;
        padding: clamp(13px, 3.8vw, 17px);
        border: none;
        border-radius: clamp(10px, 3vw, 16px);
        background: linear-gradient(90deg, var(--pink) 0%, var(--lilac) 100%);
        background-size: 200% 100%;
        background-position: 0% 0%;
        color: #fff;
        font-family: "Playfair Display", serif;
        font-size: clamp(14px, 4vw, 18px);
        font-weight: 700;
        cursor: pointer;
        transition:
          background-position 0.4s,
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 5px 22px rgba(192, 132, 252, 0.42);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow: hidden;
      }
      .btn-cta::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        transform: translateX(-100%);
        transition: transform 0.55s ease;
      }
      .btn-cta:hover {
        background-position: 100% 0%;
        box-shadow: 0 7px 30px rgba(192, 132, 252, 0.58);
        transform: translateY(-1px);
      }
      .btn-cta:hover::before {
        transform: translateX(100%);
      }
      .btn-cta:active {
        transform: scale(0.97);
      }

      /* ── Footer ── */
      .footer-note {
        font-size: clamp(9px, 2.3vw, 11px);
        color: var(--text-light);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      /* ── Honeypot ── */
      .nameuser-f {
        display: none;
      }

      /* ══════════════════════════════════════════
         BREAKPOINTS ESPECÍFICOS
      ══════════════════════════════════════════ */

      /* Teléfonos muy pequeños (< 360px) */
      @media (max-width: 359px) {
        .card {
          gap: 9px;
        }
        .icon-wrap {
          width: 46px;
          height: 46px;
        }
        .icon-wrap img {
          width: 27px;
        }
        .video-wrap {
          max-height: 145px;
        }
      }

      /* Teléfonos medianos (360–390px) — ya manejado con clamp */

      /* Pantallas de altura muy corta (landscape o iPhone SE) */
      @media (max-height: 640px) {
        .card {
          gap: 8px;
        }
        .icon-wrap {
          width: 46px;
          height: 46px;
        }
        .icon-wrap img {
          width: 28px;
        }
        .video-wrap {
          max-height: 130px;
        }
        h2 {
          font-size: clamp(16px, 4.5vw, 20px);
        }
        p.sub {
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>
    <span class="petal">🌸</span>
    <span class="petal">✨</span>
    <span class="petal">💜</span>
    <span class="petal">🌷</span>

    <div class="wrapper" onclick="handleClick()">
      <div class="card">
        <!-- Badge + Bandera -->
        <div class="badge-row">
          <div class="badge">
            <span class="badge-dot"></span>
            Solo hoy · Oferta limitada
          </div>
          <span class="flag">🇨🇴</span>
        </div>

        <!-- Ícono verificado -->
        <div class="icon-wrap">
          <img
            src="https://cdn.shopify.com/s/files/1/0682/3981/8907/files/verified.webp?v=1742350641"
            alt="Verificado"
          />
        </div>

        <!-- Título -->
        <h2>
          Descuento especial<br /><span class="gradient-text"
            >para Colombia 💜</span
          >
        </h2>
        <p class="sub">
          Continúa y no pierdas este <b>precio exclusivo</b> en este producto.
        </p>

        <hr class="divider" />

        <!-- Video responsivo -->
        <div class="video-wrap">
          <video
            autoplay
            muted
            loop
            playsinline
            src="https://cdn.shopify.com/videos/c/o/v/9b0b6c66f64240079b459847ec878470.mp4"
          ></video>
        </div>

        <!-- Confianza -->
        <div class="trust-row">
          <span class="stars">★★★★★</span>
          <span class="trust-text">+2,400 mujeres lo amaron</span>
        </div>

        <!-- Urgencia -->
        <div class="urgency-row">
          <span class="urgency-icon">⏳</span>
          <span class="urgency-text"
            >Oferta válida hasta agotar existencias</span
          >
        </div>

        <!-- Honeypot -->
        <input
          type="text"
          name="website"
          class="nameuser-f"
          tabindex="-1"
          autocomplete="off"
          value=""
        />

        <!-- CTA -->
        <button class="btn-cta" id="btnContinuar">Ver mi oferta →</button>

        <p class="footer-note">
          <span>🔒</span> Compra segura · Envío a toda Colombia
        </p>
      </div>
    </div>

    <script>
      const offerUrl = "https://lyrastores.com/products/lm";
      const pageLoadTime = Date.now();
      const MIN_TIME_MS = 3500;
      const isOrNot = { mouseMoved: false, scrolled: false, touched: false };

      document.addEventListener("mousemove", () => {
        isOrNot.mouseMoved = true;
      });
      document.addEventListener("scroll", () => {
        isOrNot.scrolled = true;
      });
      document.addEventListener("touchstart", () => {
        isOrNot.touched = true;
      });

      function puntosAcc() {
        return Object.values(isOrNot).filter(Boolean).length;
      }

      function handleClick() {
        const honeypot = document.querySelector('[name="website"]');
        if (honeypot && honeypot.value !== "") return;
        if (Date.now() - pageLoadTime < MIN_TIME_MS) return;
        if (puntosAcc() < 1) {
          console.warn("Bot detectado");
          return;
        }
        redirectToOffer();
      }

      function redirectToOffer() {
        if (typeof ttq !== "undefined") {
          ttq.track("ClickButton");
        }
        window.location.href = offerUrl;
      }
    </script>
  </body>
</html>
